name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 安装系统依赖和配置 Android SDK (关键修复步骤)
      - name: Install Dependencies and Setup Android SDK
        run: |
          set -e # 遇到错误立即停止
          
          echo "=== 安装系统依赖 ==="
          sudo apt-get update
          sudo apt-get install -y openjdk-8-jdk python3-pip libffi-dev libssl-dev unzip wget
          
          echo "=== 设置 Java 环境 ==="
          export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          
          echo "=== 定义 SDK 路径 ==="
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export CMDLINE_TOOLS_ROOT=$ANDROID_HOME/cmdline-tools
          export CMDLINE_TOOLS_BIN=$CMDLINE_TOOLS_ROOT/latest/bin
          
          mkdir -p $CMDLINE_TOOLS_ROOT
          
          echo "=== 下载 Android Command Line Tools ==="
          cd /tmp
          # 使用确定的版本号链接，避免重定向问题
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          
          echo "=== 解压并重组目录结构 ==="
          # 解压后通常是一个名为 cmdline-tools 的文件夹
          unzip -q cmdline-tools.zip
          
          # 移动到我们定义的 latest 目录下
          # 结构必须是: .../cmdline-tools/latest/bin/sdkmanager
          if [ -d "cmdline-tools" ]; then
            mv cmdline-tools $CMDLINE_TOOLS_ROOT/latest
          else
            echo "Error: Unzipped folder not found as expected."
            ls -la
            exit 1
          fi
          
          echo "=== 验证 sdkmanager 是否存在 ==="
          if [ ! -f "$CMDLINE_TOOLS_BIN/sdkmanager" ]; then
            echo "Error: sdkmanager not found at $CMDLINE_TOOLS_BIN/sdkmanager"
            ls -R $ANDROID_HOME
            exit 1
          fi
          
          echo "=== 自动接受许可证 ==="
          # 【关键修复】直接使用绝对路径调用，不依赖 PATH
          yes | "$CMDLINE_TOOLS_BIN/sdkmanager" --licenses || true
          
          echo "=== 安装核心组件 ==="
          # 【关键修复】直接使用绝对路径调用
          "$CMDLINE_TOOLS_BIN/sdkmanager" "platform-tools" "platforms;android-30" "build-tools;30.0.3"
          
          echo "=== 设置全局 PATH 供后续步骤使用 ==="
          echo "$CMDLINE_TOOLS_BIN" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      # 4. 安装 Python 构建工具
      - name: Install Python Build Tools
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython==0.29.33

      # 5. 执行 Buildozer 构建
      - name: Build APK with Buildozer
        run: |
          echo "当前目录:"
          ls -la
          
          # 初始化 spec 文件 (如果不存在)
          if [ ! -f buildozer.spec ]; then
            echo "初始化 buildozer.spec..."
            buildozer init
          fi
          
          # 显示 spec 文件内容以便调试
          cat buildozer.spec
          
          echo "开始构建 APK (这可能需要 30-50 分钟)..."
          buildozer android debug

      # 6. 上传 APK 产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always() # 即使构建失败也尝试上传（如果有部分产物）
        with:
          name: my-app-apk
          path: bin/*.apk
          retention-days: 5
